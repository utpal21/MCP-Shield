version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mcp-shield-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp_shield
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mcp-shield-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mcp-shield-app
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mcp_shield
      REDIS_URL: redis://redis:6379
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      API_KEY_SALT: change_me_32_char_random_string_for_development
      RATE_LIMIT_FREE: 60
      RATE_LIMIT_PRO: 600
      SCAN_BLOCKLIST_SEED: malware.com,phishing.org
      MCPIZE_WEBHOOK_SECRET: whsec_development_secret
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    volumes:
      - ..:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: